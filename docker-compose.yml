services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: tech_full_stack
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d tech_full_stack"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:latest
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: development
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://root:root@postgres:5432/tech_full_stack
      PORT: 8787
      JWT_SECRET: secret-key-at-least-32-characters-long
      JWT_EXPIRES_IN_DAYS: 7
      NODE_ENV: development
    ports:
      - "8787:8787"
    volumes:
      - ./apps/api/src:/app/apps/api/src
    depends_on:
      postgres:
        condition: service_healthy

  drizzle-studio:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: development
    restart: unless-stopped
    command: pnpm --filter @tech-full-stack/api exec drizzle-kit studio --host 0.0.0.0
    environment:
      DATABASE_URL: postgresql://root:root@postgres:5432/tech_full_stack
    ports:
      - "4983:4983"
    volumes:
      - ./apps/api/src:/app/apps/api/src
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: development
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:8787
      API_PROXY_URL: http://api:8787
    ports:
      - "5173:5173"
    volumes:
      - ./apps/web/src:/app/apps/web/src
    depends_on:
      - api

volumes:
  postgres_data:
  pgadmin_data:
