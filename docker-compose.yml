services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: fastify_vue
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d fastify_vue"]
      interval: 5s
      timeout: 5s
      retries: 10

  valkey:
    image: valkey/valkey:9.1-alpine
    restart: unless-stopped
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: development
    restart: unless-stopped
    env_file:
      - ./apps/api/.env
    environment:
      DATABASE_URL: postgresql://root:root@postgres:5432/fastify_vue
      REDIS_URL: redis://valkey:6379
      PORT: 3000
      NODE_ENV: development
    ports:
      - "3000:3000"
    volumes:
      - ./apps/api/src:/app/apps/api/src
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy

  drizzle-studio:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: development
    restart: unless-stopped
    command: pnpm --filter @monorepo-fastify-vue/api exec drizzle-kit studio --host 0.0.0.0
    environment:
      DATABASE_URL: postgresql://root:root@postgres:5432/fastify_vue
    ports:
      - "4983:4983"
    volumes:
      - ./apps/api/src:/app/apps/api/src
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: development
    restart: unless-stopped
    environment:
      API_PROXY_URL: http://api:3000
    ports:
      - "5173:5173"
    volumes:
      - ./apps/web/src:/app/apps/web/src
    depends_on:
      - api

volumes:
  postgres_data:
